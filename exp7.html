<!DOCTYPE html>
<html>
<head>
    <title>Link Tag Example</title>
</head>
<body>

    <h1>HTML Link Example</h1>

    <h2>1. External Link</h2>
    <a href="https://www.youtube.com">Go to YouTube</a>

    <h2>2. Open Link in New Tab</h2>
    <a href="https://www.github.com" target="_blank">Open GitHub</a>

    <h2>3. Link to Another Page</h2>
    <a href="contact.html">Go to Contact Page</a>

    <h2>4. Email Link</h2>
    <a href="mailto:brahmeesubhasbagade@gmail.com">Send Email</a>

</body>
</html>
